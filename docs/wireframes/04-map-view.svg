<svg viewBox="0 0 960 600" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
  <defs>
    <pattern id="dots4" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#d7dde5"/>
    </pattern>
  </defs>
  <rect x="0" y="0" width="960" height="600" fill="#f8f9fb"/>
  <rect x="0" y="0" width="960" height="600" fill="url(#dots4)"/>
  <text x="540" y="34" text-anchor="middle" font-size="13" letter-spacing="2" fill="#9aa4b2">MAP VIEW — uploaded map image with draggable Location markers</text>

  <!-- Map background image (a non-draggable bottom node) -->
  <g>
    <rect x="180" y="70" width="600" height="470" rx="8" fill="#e9efe6" stroke="#bcc8b6" stroke-width="1.5"/>
    <path d="M180 360 Q 320 320 460 370 T 780 350" fill="none" stroke="#c4d1bd" stroke-width="6"/>
    <path d="M260 70 Q 300 220 240 360 T 300 540" fill="none" stroke="#cdd9c6" stroke-width="5"/>
    <text x="480" y="305" text-anchor="middle" font-size="12" fill="#9fb094">uploaded map image (background layer)</text>
  </g>

  <!-- Location marker A (collapsed pin) -->
  <g>
    <circle cx="360" cy="200" r="13" fill="#ef4444" stroke="#fff" stroke-width="2"/>
    <path d="M360 213 L 353 226 L 367 226 Z" fill="#ef4444"/>
    <rect x="378" y="190" width="120" height="22" rx="6" fill="#fff" stroke="#cbd2dc"/>
    <text x="388" y="205" font-size="11" fill="#475569">Riverwatch Keep</text>
  </g>

  <!-- Location marker B (expanded) -->
  <g>
    <circle cx="600" cy="420" r="13" fill="#ef4444" stroke="#fff" stroke-width="2"/>
    <path d="M600 433 L 593 446 L 607 446 Z" fill="#ef4444"/>
    <rect x="455" y="300" width="270" height="150" rx="10" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
    <rect x="455" y="300" width="270" height="28" rx="10" fill="#eef2f7"/>
    <text x="470" y="319" font-size="11" fill="#475569">The Sunken Road</text>
    <text x="470" y="346" font-size="9" letter-spacing="1" fill="#9aa4b2">DESCRIPTION</text>
    <rect x="470" y="352" width="240" height="34" rx="6" fill="#fbfcfe" stroke="#cbd2dc"/>
    <text x="470" y="406" font-size="9" letter-spacing="1" fill="#9aa4b2">PLOT VIEW REFERENCES</text>
    <text x="480" y="424" font-size="11" fill="#334155">•  Siege of the keep ↗</text>
    <text x="480" y="440" font-size="9" fill="#94a3b8">(click ↗ jumps to that Plot Card)</text>
  </g>

  <!-- Floating left toolbar -->
  <g>
    <rect x="24" y="60" width="72" height="480" rx="16" fill="#ffffff" stroke="#cbd2dc" stroke-width="1.5"/>
    <text x="60" y="84" text-anchor="middle" font-size="8" letter-spacing="1" fill="#9aa4b2">PROJECT</text>
    <rect x="38" y="92" width="44" height="44" rx="10" fill="#f1f4f8" stroke="#cbd2dc"/>
    <text x="60" y="120" text-anchor="middle" font-size="18" fill="#475569">＋</text>
    <rect x="38" y="144" width="44" height="44" rx="10" fill="#f1f4f8" stroke="#cbd2dc"/>
    <text x="60" y="172" text-anchor="middle" font-size="16" fill="#475569">⇄</text>
    <rect x="38" y="196" width="44" height="44" rx="10" fill="#f1f4f8" stroke="#cbd2dc"/>
    <text x="60" y="224" text-anchor="middle" font-size="16" fill="#475569">⤓</text>
    <line x1="36" y1="262" x2="84" y2="262" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="60" y="286" text-anchor="middle" font-size="8" letter-spacing="1" fill="#9aa4b2">TOOLS</text>
    <rect x="38" y="294" width="44" height="44" rx="10" fill="#eaf1ff" stroke="#3b82f6"/>
    <text x="60" y="322" text-anchor="middle" font-size="18" fill="#2563eb">＋</text>
    <rect x="38" y="346" width="44" height="44" rx="10" fill="#f1f4f8" stroke="#cbd2dc"/>
    <text x="60" y="374" text-anchor="middle" font-size="16" fill="#475569">🖼</text>
    <rect x="38" y="398" width="44" height="44" rx="10" fill="#f1f4f8" stroke="#cbd2dc"/>
    <text x="60" y="426" text-anchor="middle" font-size="16" fill="#475569">▤</text>
  </g>

  <!-- Annotations -->
  <g font-size="11" fill="#64748b">
    <line x1="96" y1="316" x2="120" y2="316" stroke="#cbd2dc" stroke-dasharray="3 3"/>
    <text x="126" y="320">New Location</text>
    <line x1="96" y1="368" x2="120" y2="368" stroke="#cbd2dc" stroke-dasharray="3 3"/>
    <text x="126" y="372">Add background image</text>
    <line x1="96" y1="420" x2="120" y2="420" stroke="#cbd2dc" stroke-dasharray="3 3"/>
    <text x="126" y="424">Switch to Plot View</text>
  </g>
</svg>
