<svg viewBox="0 0 960 460" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
  <defs>
    <pattern id="dots3" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#d7dde5"/>
    </pattern>
  </defs>
  <rect x="0" y="0" width="960" height="460" fill="#f8f9fb"/>
  <rect x="0" y="0" width="960" height="460" fill="url(#dots3)"/>
  <text x="480" y="34" text-anchor="middle" font-size="13" letter-spacing="2" fill="#9aa4b2">RELATIONSHIP LINE — clickable, editable description (react-flow custom edge)</text>

  <!-- Card A -->
  <rect x="120" y="120" width="150" height="100" rx="10" fill="#fff" stroke="#cbd2dc" stroke-width="1.5"/>
  <rect x="120" y="120" width="150" height="28" rx="10" fill="#eef2f7"/>
  <text x="135" y="139" font-size="11" fill="#475569">King's betrayal</text>

  <!-- Card B -->
  <rect x="690" y="260" width="150" height="100" rx="10" fill="#fff" stroke="#cbd2dc" stroke-width="1.5"/>
  <rect x="690" y="260" width="150" height="28" rx="10" fill="#eef2f7"/>
  <text x="705" y="279" font-size="11" fill="#475569">Siege of the keep</text>

  <!-- Edge -->
  <path d="M 270 170 C 430 170, 520 310, 690 310" fill="none" stroke="#3b82f6" stroke-width="3"/>

  <!-- Clicked state: description popover anchored to midpoint -->
  <g>
    <rect x="392" y="150" width="220" height="120" rx="12" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
    <polygon points="470,270 486,270 478,284" fill="#ffffff" stroke="#3b82f6"/>
    <text x="408" y="174" font-size="10" letter-spacing="1" fill="#9aa4b2">RELATIONSHIP DESCRIPTION</text>
    <rect x="408" y="184" width="188" height="68" rx="8" fill="#fbfcfe" stroke="#cbd2dc"/>
    <text x="418" y="206" font-size="11" fill="#475569">"Causes" — the betrayal</text>
    <text x="418" y="224" font-size="11" fill="#475569">triggers the siege three</text>
    <text x="418" y="242" font-size="11" fill="#475569">days later…</text>
  </g>

  <text x="478" y="312" text-anchor="middle" font-size="11" fill="#2563eb">▲ click the line to open this editor</text>
</svg>
