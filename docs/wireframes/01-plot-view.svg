<svg viewBox="0 0 960 600" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
  <defs>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#d7dde5"/>
    </pattern>
  </defs>

  <!-- Canvas -->
  <rect x="0" y="0" width="960" height="600" fill="#f8f9fb"/>
  <rect x="0" y="0" width="960" height="600" fill="url(#dots)"/>
  <text x="480" y="34" text-anchor="middle" font-size="13" letter-spacing="2" fill="#9aa4b2">PLOT VIEW — full-page react-flow canvas (pan / zoom)</text>

  <!-- Relationship line between two cards -->
  <path d="M 372 250 C 470 250, 470 360, 560 360" fill="none" stroke="#3b82f6" stroke-width="2.5"/>
  <g>
    <rect x="444" y="291" width="118" height="26" rx="13" fill="#fff" stroke="#3b82f6"/>
    <text x="503" y="308" text-anchor="middle" font-size="11" fill="#2563eb">relationship ▸ click</text>
  </g>

  <!-- Plot Card A (collapsed) -->
  <g>
    <rect x="232" y="150" width="140" height="120" rx="10" fill="#ffffff" stroke="#cbd2dc" stroke-width="1.5"/>
    <rect x="232" y="150" width="140" height="30" rx="10" fill="#eef2f7"/>
    <text x="246" y="170" font-size="11" fill="#475569">Plot Card · title</text>
    <rect x="244" y="190" width="116" height="50" rx="6" fill="#e8ecf1" stroke="#cbd2dc" stroke-dasharray="4 3"/>
    <text x="302" y="219" text-anchor="middle" font-size="10" fill="#94a3b8">image (blank default)</text>
    <circle cx="350" cy="256" r="11" fill="#eaf1ff" stroke="#3b82f6"/>
    <text x="350" y="260" text-anchor="middle" font-size="11" fill="#2563eb">🔗</text>
  </g>

  <!-- Plot Card B (collapsed) -->
  <g>
    <rect x="560" y="300" width="140" height="120" rx="10" fill="#ffffff" stroke="#cbd2dc" stroke-width="1.5"/>
    <rect x="560" y="300" width="140" height="30" rx="10" fill="#eef2f7"/>
    <text x="574" y="320" font-size="11" fill="#475569">Plot Card · title</text>
    <rect x="572" y="340" width="116" height="50" rx="6" fill="#e8ecf1" stroke="#cbd2dc" stroke-dasharray="4 3"/>
    <text x="630" y="369" text-anchor="middle" font-size="10" fill="#94a3b8">image (blank default)</text>
    <circle cx="678" cy="406" r="11" fill="#eaf1ff" stroke="#3b82f6"/>
    <text x="678" y="410" text-anchor="middle" font-size="11" fill="#2563eb">🔗</text>
  </g>

  <!-- Floating left toolbar -->
  <g>
    <rect x="24" y="60" width="72" height="480" rx="16" fill="#ffffff" stroke="#cbd2dc" stroke-width="1.5"/>

    <!-- TOP SECTION -->
    <text x="60" y="84" text-anchor="middle" font-size="8" letter-spacing="1" fill="#9aa4b2">PROJECT</text>
    <g>
      <rect x="38" y="92" width="44" height="44" rx="10" fill="#f1f4f8" stroke="#cbd2dc"/>
      <text x="60" y="120" text-anchor="middle" font-size="18" fill="#475569">＋</text>
    </g>
    <g>
      <rect x="38" y="144" width="44" height="44" rx="10" fill="#f1f4f8" stroke="#cbd2dc"/>
      <text x="60" y="172" text-anchor="middle" font-size="16" fill="#475569">⇄</text>
    </g>
    <g>
      <rect x="38" y="196" width="44" height="44" rx="10" fill="#f1f4f8" stroke="#cbd2dc"/>
      <text x="60" y="224" text-anchor="middle" font-size="16" fill="#475569">⤓</text>
    </g>

    <line x1="36" y1="262" x2="84" y2="262" stroke="#e2e8f0" stroke-width="1.5"/>

    <!-- BOTTOM SECTION -->
    <text x="60" y="286" text-anchor="middle" font-size="8" letter-spacing="1" fill="#9aa4b2">TOOLS</text>
    <g>
      <rect x="38" y="294" width="44" height="44" rx="10" fill="#eaf1ff" stroke="#3b82f6"/>
      <text x="60" y="322" text-anchor="middle" font-size="18" fill="#2563eb">＋</text>
    </g>
    <g>
      <rect x="38" y="346" width="44" height="44" rx="10" fill="#f1f4f8" stroke="#cbd2dc"/>
      <text x="60" y="374" text-anchor="middle" font-size="16" fill="#475569">🗺</text>
    </g>
  </g>

  <!-- Annotations -->
  <g font-size="11" fill="#64748b">
    <line x1="96" y1="114" x2="150" y2="114" stroke="#cbd2dc" stroke-dasharray="3 3"/>
    <text x="156" y="118">New project</text>
    <line x1="96" y1="166" x2="150" y2="166" stroke="#cbd2dc" stroke-dasharray="3 3"/>
    <text x="156" y="170">Switch project</text>
    <line x1="96" y1="218" x2="150" y2="218" stroke="#cbd2dc" stroke-dasharray="3 3"/>
    <text x="156" y="222">Manual Save (JSON export)</text>
    <line x1="96" y1="316" x2="150" y2="316" stroke="#cbd2dc" stroke-dasharray="3 3"/>
    <text x="156" y="320">New Plot Card</text>
    <line x1="96" y1="368" x2="150" y2="368" stroke="#cbd2dc" stroke-dasharray="3 3"/>
    <text x="156" y="372">Switch to Map View</text>
  </g>
</svg>
